<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>pi.local</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --border: #222;
      --green: #00ff88;
      --green-dim: #00ff8833;
      --green-mid: #00ff8866;
      --text: #c8c8c8;
      --text-dim: #555;
      --text-bright: #eee;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      overflow-x: hidden;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* noise texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    .layout {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 2rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
      animation: fadeDown 0.6s ease both;
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    .hostname {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--green);
      letter-spacing: 0.05em;
    }

    .hostname::before { content: '> '; opacity: 0.5; }

    .subtitle {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .status-bar {
      display: flex;
      gap: 1.5rem;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    .dot.offline { background: #555; box-shadow: none; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .section-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 1px;
    }

    .card {
      background: var(--surface);
      padding: 1.5rem;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      position: relative;
      overflow: hidden;
      transition: background 0.15s;
      animation: fadeUp 0.5s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.10s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.20s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.30s; }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--green-dim);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .card:hover::before { opacity: 1; }

    .card:hover .card-icon { color: var(--green); }
    .card:hover .card-name { color: var(--green); }

    .card-icon {
      font-size: 1.4rem;
      line-height: 1;
      transition: color 0.15s;
    }

    .card-name {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-bright);
      letter-spacing: 0.05em;
      transition: color 0.15s;
    }

    .card-desc {
      font-size: 0.65rem;
      color: var(--text-dim);
      line-height: 1.5;
      font-family: 'IBM Plex Sans', sans-serif;
    }

    .card-status {
      margin-top: auto;
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .card-status .dot { width: 4px; height: 4px; }

    .card.coming-soon {
      opacity: 0.4;
      cursor: default;
    }
    .card.coming-soon::before { display: none; }

    footer {
      margin-top: auto;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .clock { color: var(--text-dim); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="layout">

  <header>
    <div class="header-left">
      <span class="hostname">pi.local</span>
      <span class="subtitle">home server</span>
    </div>
    <div class="status-bar">
      <div class="status-item"><div class="dot"></div> online</div>
      <div class="status-item" id="uptime">uptime —</div>
    </div>
  </header>

  <div class="section-label">// services</div>

  <div class="grid">

    <a href="/todos" class="card coming-soon">
      <div class="card-icon">☑</div>
      <div class="card-name">Todo List</div>
      <div class="card-desc">Tasks and reminders</div>
      <div class="card-status"><div class="dot offline"></div>coming soon</div>
    </a>

    <a href="/calendar" class="card coming-soon">
      <div class="card-icon">◫</div>
      <div class="card-name">Calendar</div>
      <div class="card-desc">Events and schedule</div>
      <div class="card-status"><div class="dot offline"></div>coming soon</div>
    </a>

    <a href="/notes" class="card coming-soon">
      <div class="card-icon">≡</div>
      <div class="card-name">Notes</div>
      <div class="card-desc">Personal notes</div>
      <div class="card-status"><div class="dot offline"></div>coming soon</div>
    </a>

    <a href="/files" class="card coming-soon">
      <div class="card-icon">⊟</div>
      <div class="card-name">Files</div>
      <div class="card-desc">File browser</div>
      <div class="card-status"><div class="dot offline"></div>coming soon</div>
    </a>

    <a href="/media" class="card coming-soon">
      <div class="card-icon">▷</div>
      <div class="card-name">Media</div>
      <div class="card-desc">Photos and videos</div>
      <div class="card-status"><div class="dot offline"></div>coming soon</div>
    </a>

    <a href="/monitor.html" class="card coming-soon">
      <div class="card-icon">⎍</div>
      <div class="card-name">Monitor</div>
      <div class="card-desc">System stats</div>
      <div class="card-status"><div class="dot offline"></div>coming soon</div>
    </a>

  </div>

  <footer>
    <span>raspberry pi 4 — 8gb</span>
    <span class="clock" id="clock"></span>
  </footer>

</div>

<script>
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleDateString('en-GB', { weekday: 'short', day: '2-digit', month: 'short' }) +
      '  ' +
      now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 1000);

  // uptime via server if available, else hide
 fetch('/api/uptime').then(r => {
  if (r.ok) return r.text();
  throw new Error();
}).then(t => {
  document.getElementById('uptime').textContent = 'up ' + t;
}).catch(() => {
  document.getElementById('uptime').textContent = '';
});
</script>
</body>
</html>
