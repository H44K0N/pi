services:
  minecraft:
    image: itzg/minecraft-server
    container_name: minecraft
    restart: unless-stopped
    ports:
      - "25565:25565"
    volumes:
      - /mnt/minecraft:/data
    environment:
      VERSION: "26.1.2"
      EULA: "TRUE"
      MEMORY: "4G"
      TYPE: "PAPER"
      MOTD: "OngaBonga"
